name: Docker

# Build and push a container image on every push to main. The Dockerfile runs
# the test suite and builds all three frontends, so a passing image build is
# also the CI gate (mirrors the GitHub release workflow).
#
# The image goes to this Forgejo instance's built-in container registry at
# <instance-host>/<owner>/glidemap. Auth uses the token Forgejo injects into
# every Actions run (secrets.GITHUB_TOKEN), which already has package write
# scope for the repository owner — no extra secret to configure.
on:
  push:
    branches: [main]

# Serialize runs so two quick pushes don't race on the :latest tag.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE_NAME: glidemap

jobs:
  docker:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      # Registry host = the Forgejo instance host (strip the scheme off the
      # server URL); image path = <host>/<owner>/glidemap, lowercased.
      - name: Resolve registry + image name
        id: image
        run: |
          host="${GITHUB_SERVER_URL#http://}"
          host="${host#https://}"
          host="${host%%/*}"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "registry=$host" >> "$GITHUB_OUTPUT"
          echo "image=$host/$owner/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Registry-backed cache so the ~1.5GB node+Chromium deps layer stays a
          # hit across runs when package*.json is unchanged.
          cache-from: type=registry,ref=${{ steps.image.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.image }}:buildcache,mode=max
