name: Docker

# Build and push a container image on every push to main. The Dockerfile runs
# the test suite and builds all three frontends, so a passing image build is
# also the CI gate (mirrors the GitHub release workflow).
#
# The image goes to this Forgejo instance's built-in container registry at
# <instance-host>/<owner>/glidemap. Auth uses the token Forgejo injects into
# every Actions run (secrets.GITHUB_TOKEN), which already has package write
# scope for the repository owner — no extra secret to configure.
#
# RUNNER REQUIREMENTS:
#   * The job needs access to a Docker daemon. The runner must mount the host
#     socket into the job (e.g. config.yaml `container.valid_volumes` +
#     `/var/run/docker.sock:/var/run/docker.sock`, or DOCKER_HOST).
#   * The instance registry is served over plain HTTP, so the host daemon must
#     list it as insecure — /etc/docker/daemon.json:
#       { "insecure-registries": ["forgejo.mikahear.es:3001"] }
#     then restart the daemon. (Plain `docker push` honours this; that's why
#     this workflow uses the docker CLI directly instead of buildx, whose
#     buildkit builder would need its own insecure-registry config.)
on:
  push:
    branches: [main]

# Serialize runs so two quick pushes don't race on the :latest tag.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE_NAME: glidemap
  # Registry host as the HOST docker engine sees it. With Docker-out-of-Docker
  # the build/push run on the host daemon, so this must be the externally
  # routable name — NOT the internal GITHUB_SERVER_URL (http://forgejo:3000),
  # which only resolves inside the runner's compose network.
  REGISTRY: forgejo.mikahear.es:3001

jobs:
  docker:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      # The default job image (node:20-bookworm) has no docker client. Install
      # one if it's missing, then confirm we can reach the mounted daemon.
      - name: Ensure docker CLI + daemon reachable
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends docker.io ca-certificates
          fi
          docker version

      # Image path = <registry>/<owner>/glidemap, owner lowercased.
      - name: Resolve image name
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/$owner/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to the registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login "${{ steps.image.outputs.registry }}" \
                -u "${{ github.actor }}" --password-stdin

      # Plain build + push. The host daemon's layer cache persists across runs,
      # so the heavy node+Chromium deps layer is reused when package*.json is
      # unchanged — no registry-backed buildx cache needed.
      - name: Build and push
        run: |
          IMAGE="${{ steps.image.outputs.image }}"
          docker build \
            -t "$IMAGE:sha-${{ github.sha }}" \
            -t "$IMAGE:latest" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
          docker push "$IMAGE:sha-${{ github.sha }}"
          docker push "$IMAGE:latest"
