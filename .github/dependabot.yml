version: 2
updates:
  # Keep npm dependencies patched; group low-risk updates to reduce PR noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Keep the base image and tooling in the Dockerfile current.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
