name: CI

# Pre-merge gate: run the test suite, type-checks, and frontend builds on
# every PR and on pushes to the default branch. Previously these only ran
# inside the Dockerfile during a release, so regressions could merge first.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref so only the latest commit is gated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # matches the node:24 base image used at release
          cache: npm

      - run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck webapp
        run: npm run typecheck:webapp

      - name: Typecheck adminapp
        run: npm run typecheck:adminapp

      - name: Build renderer
        run: npm run build:renderer

      - name: Build webapp
        run: npm run build:webapp

      - name: Build admin
        run: npm run build:admin
