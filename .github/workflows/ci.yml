name: CI

# Pre-merge gate on every PR and push to main: type-checks, the test suite,
# frontend builds, and a dependency vulnerability audit. These previously only
# ran inside the Dockerfile during a release, so regressions could merge first.
# The release workflow's Docker build remains the heavyweight gate; this is the
# quick one that catches most issues without downloading the Chromium build.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs for the same ref so only the latest commit is gated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # matches the node:24 base image used at release
          cache: npm

      # --ignore-scripts skips Playwright's ~170MB Chromium download; nothing in
      # this gate renders, so the browser isn't needed here.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck webapp
        run: npm run typecheck:webapp

      - name: Typecheck adminapp
        run: npm run typecheck:adminapp

      - name: Test
        run: npm test

      - name: Build renderer
        run: npm run build:renderer

      - name: Build webapp
        run: npm run build:webapp

      - name: Build admin
        run: npm run build:admin

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
