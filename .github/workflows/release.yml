name: Release

# Releases happen by bumping the version in the top-level VERSION file and
# pushing to the release branch. The job refuses to run twice for the same
# version, so every image and GitHub release is tied to a unique semver tag.
#
# The version lives in VERSION (not package.json) on purpose: package.json gates
# the Docker deps layer (npm ci + the ~170MB Chromium install), so keeping its
# bytes stable across releases lets that layer stay a cache hit. Only VERSION and
# source change per release, which re-runs just the tests + frontend builds.
on:
  push:
    branches: [release]

permissions:
  contents: write # create the version tag + GitHub release
  packages: write # push to ghcr

# Serialize release runs: two pushes in quick succession must not race on the
# :latest tag or the tag/release creation.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE_NAME: glidemap

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so existing version tags are visible

      - name: Read version from VERSION file
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::VERSION file contents \"$version\" is not a valid semver string."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Block re-releasing a version with different code, but allow re-running
      # a failed workflow for the same commit so a partial release (e.g. image
      # pushed but the release step failed) can be retried.
      - name: Ensure this version has not been released
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tagged_commit" != "$GITHUB_SHA" ]; then
              echo "::error::$tag already exists for a different commit. Bump the version in VERSION before pushing to release."
              exit 1
            fi
            echo "$tag already points at this commit; continuing as a re-run."
          fi

      # Claim the version tag before any artifact is published. This makes the
      # uniqueness guard authoritative from the start of the run: a later push
      # of a different commit with the same version is blocked even if this
      # run's image push or release step failed midway.
      - name: Create version tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

      - name: Resolve image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Dockerfile runs the test suite and builds all three frontends,
      # so a passing image build is also the CI gate.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:v${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          # Registry-backed cache: unlike type=gha (hard 10GB eviction limit,
          # which evicts the ~1.5GB node+Chromium deps layer between releases),
          # a dedicated buildcache tag in ghcr persists, so the Chromium download
          # + npm ci layer is a reliable cache hit when package*.json is unchanged.
          cache-from: type=registry,ref=${{ steps.image.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.image }}:buildcache,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping (re-run)."
            exit 0
          fi
          gh release create "$tag" \
            --title "Glidemap $tag" \
            --generate-notes
