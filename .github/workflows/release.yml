name: Release

# Releases happen by bumping "version" in package.json and pushing to the
# release branch. The job refuses to run twice for the same version, so every
# image and GitHub release is tied to a unique semver tag.
on:
  push:
    branches: [release]

permissions:
  contents: write # create the version tag + GitHub release
  packages: write # push to ghcr

env:
  IMAGE_NAME: glidemap

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so existing version tags are visible

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Ensure this version has not been released
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null; then
            echo "::error::v${{ steps.version.outputs.version }} already exists. Bump \"version\" in package.json before pushing to release."
            exit 1
          fi

      - name: Resolve image name
        id: image
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Dockerfile runs the test suite and builds all three frontends,
      # so a passing image build is also the CI gate.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:v${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --title "Glidemap v${{ steps.version.outputs.version }}" \
            --generate-notes
