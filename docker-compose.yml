services:
  mapanim:
    container_name: mapanim
    build:
      context: .
      dockerfile: Dockerfile
    image: mapanim:local
    ipc: host
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      MAPANIM_ADMIN_PORT: 5174
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - ./output:/app/output
      - ./presets:/app/presets
      - ./.tile-cache:/app/.tile-cache
      - ./.metrics:/app/.metrics
      - ./routes.json:/app/routes.json
